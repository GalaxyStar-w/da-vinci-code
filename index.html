<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Da Vinci Code</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#16213e);color:#e0e0e0;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;font-family:inherit}
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:24px;padding:20px;text-align:center}
#setup h1{font-size:2.4em;background:linear-gradient(90deg,#e94560,#f5c518);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#888;font-size:.95em;max-width:400px;line-height:1.5}
.sgroup{background:rgba(255,255,255,.05);border-radius:16px;padding:24px 32px;display:flex;flex-direction:column;gap:16px;min-width:280px}
.sgroup label{font-size:.95em;color:#888}
.brow{display:flex;gap:10px;justify-content:center}
.bopt{padding:10px 20px;border-radius:10px;background:rgba(255,255,255,.08);color:#e0e0e0;font-size:1em;transition:.2s}
.bopt:hover,.bopt.active{background:#e94560;color:#fff}
#btnStart{padding:14px 48px;border-radius:12px;background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;font-size:1.15em;font-weight:600;margin-top:8px;transition:.2s}
#btnStart:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(233,69,96,.4)}
#game{display:none;padding:10px;max-width:900px;margin:0 auto}
.ibar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,.06);border-radius:10px;margin-bottom:10px;flex-wrap:wrap;gap:6px;font-size:.85em}
.turn{color:#f5c518;font-weight:600}
.dinfo{color:#888}
.msg{text-align:center;padding:10px;min-height:40px;font-size:1em;color:#f5c518}
.psec{margin-bottom:16px;border-radius:14px;padding:12px;position:relative;transition:.3s}
.psec.cur{background:rgba(233,69,96,.1);box-shadow:0 0 0 2px #e94560}
.psec.out{opacity:.4;pointer-events:none}
.pname{font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:.95em}
.badge{font-size:.7em;padding:2px 8px;border-radius:6px;background:#e94560;color:#fff}
.ebadge{font-size:.7em;padding:2px 8px;border-radius:6px;background:#555;color:#aaa}
.crow{display:flex;gap:6px;flex-wrap:wrap;align-items:center;min-height:82px}
.crd{width:50px;height:72px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85em;position:relative;transition:.2s;flex-shrink:0;user-select:none}
.cback{background:linear-gradient(135deg,#2c3e50,#34495e);border:2px solid #4a6070;color:transparent}
.cback::after{content:'?';color:rgba(255,255,255,.25);font-size:1.4em}
.cblack{background:linear-gradient(135deg,#1a1a2e,#2d2d44);border:2px solid #444;color:#e0e0e0}
.cwhite{background:linear-gradient(135deg,#e8e8e8,#f5f5f5);border:2px solid #ccc;color:#222}
.cjoker{background:linear-gradient(135deg,#8e44ad,#9b59b6);border:2px solid #a66bbe;color:#fff}
.cjoker::before{content:'*';font-size:1.2em}
.cpub{box-shadow:0 0 8px rgba(245,197,24,.5)}
.crd.sel{cursor:pointer;animation:pulse 1.5s infinite}
.crd.stgt{box-shadow:0 0 12px #e94560;transform:scale(1.08)}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(233,69,96,.3)}50%{box-shadow:0 0 12px rgba(233,69,96,.7)}}
.darea{display:flex;align-items:center;gap:10px;justify-content:center;padding:10px;margin:8px 0;background:rgba(255,255,255,.04);border-radius:10px;flex-wrap:wrap}
.dlbl{font-size:.85em;color:#888}
.gpanel{background:rgba(255,255,255,.06);border-radius:12px;padding:16px;margin:10px 0;display:flex;flex-direction:column;gap:12px;align-items:center}
.gpanel h3{font-size:1em;color:#f5c518}
.grow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.grow .bopt{padding:6px 14px;font-size:.85em;border-radius:8px}
.grow .bopt.active{background:#e94560}
.abtn{display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.bact{padding:10px 24px;border-radius:10px;font-size:.95em;font-weight:600;transition:.2s;color:#fff}
.bact:hover{transform:scale(1.04)}
.bcnf{background:linear-gradient(135deg,#e94560,#c0392b)}
.bcnt{background:linear-gradient(135deg,#27ae60,#2ecc71)}
.bend{background:linear-gradient(135deg,#2980b9,#3498db)}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:20px;text-align:center}
#ov h2{font-size:2em;color:#f5c518}
#ov p{font-size:1.1em;max-width:400px;line-height:1.6}
#ov button{padding:14px 40px;border-radius:12px;background:#e94560;color:#fff;font-size:1.1em;font-weight:600}
.shint{font-size:.8em;color:#888;text-align:center;padding:4px}
@media(max-width:600px){.crd{width:42px;height:62px}#setup h1{font-size:1.8em}.sgroup{padding:16px 20px;min-width:0;width:100%}.ibar{font-size:.75em}}
</style>
</head>
<body>
<div id="setup">
<h1>Da Vinci Code</h1>
<p class="subtitle">Deduction Card Game - Guess your opponent's hidden numbers!</p>
<div class="sgroup">
<label>Players</label>
<div class="brow" id="pbtns">
<button class="bopt active" data-v="2">2P</button>
<button class="bopt" data-v="3">3P</button>
<button class="bopt" data-v="4">4P</button>
</div>
</div>
<div class="sgroup">
<label>Mode</label>
<div class="brow" id="mbtns">
<button class="bopt active" data-v="0">Basic</button>
<button class="bopt" data-v="1">Advanced (Joker)</button>
</div>
</div>
<button id="btnStart">Start Game</button>
</div>
<div id="game">
<div class="ibar">
<span class="turn" id="tinfo"></span>
<span class="dinfo" id="dinfo"></span>
</div>
<div class="msg" id="msg"></div>
<div id="psecs"></div>
<div id="act"></div>
</div>
<div id="ov">
<h2 id="ovt"></h2>
<p id="ovm"></p>
<button onclick="location.reload()">Play Again</button>
</div>
<script>
var COLORS=['black','white'];
var CLABEL={black:'Black',white:'White'};
var G;
function newGame(pc,jk){
G={pc:pc,jk:jk,deck:[],pl:[],cur:0,ph:'sort',drawn:null,gt:null,gc:null,gn:null,gj:false,lastOk:false,sa:false,hi:0};
var d=[];
for(var n=0;n<=11;n++){d.push({c:'black',n:n,j:false,r:false});d.push({c:'white',n:n,j:false,r:false});}
if(jk){d.push({c:'joker',n:-1,j:true,r:false});d.push({c:'joker',n:-1,j:true,r:false});}
shuf(d);G.deck=d;
var cpp=pc===2?4:3;
var nm=['You (P1)','CPU 2','CPU 3','CPU 4'];
for(var i=0;i<pc;i++){
var h=[];
for(var j=0;j<cpp;j++)h.push(G.deck.pop());
G.pl.push({nm:nm[i],ih:i===0,cs:sortC(h),out:false});
}
G.cur=Math.floor(Math.random()*pc);
ren();msg('Game started! Your cards are sorted. Click to confirm.');
}
function shuf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}}
function sortC(cs){return cs.slice().sort(function(a,b){if(a.j&&b.j)return 0;if(a.j)return -1;if(b.j)return 1;if(a.n!==b.n)return a.n-b.n;if(a.c===b.c)return 0;return a.c==='black'?-1:1;});}
function cc(c){if(c.j)return'cjoker';return c.c==='black'?'cblack':'cwhite';}
function cl(c){if(c.j)return'Joker';return(CLABEL[c.c]||c.c)+' '+c.n;}
function ren(){
var con=document.getElementById('psecs');con.innerHTML='';
var ord=[G.hi];for(var i=0;i<G.pc;i++)if(i!==G.hi)ord.push(i);
ord.forEach(function(pi){
var p=G.pl[pi];
var own=pi===G.hi;
var s=document.createElement('div');s.className='psec';
if(pi===G.cur)s.className+=' cur';if(p.out)s.className+=' out';
var nd=document.createElement('div');nd.className='pname';nd.innerHTML=p.nm;
if(pi===G.cur&&!p.out)nd.innerHTML+='<span class="badge">Current Turn</span>';
if(p.out)nd.innerHTML+='<span class="ebadge">Eliminated</span>';
s.appendChild(nd);
var rw=document.createElement('div');rw.className='crow';
p.cs.forEach(function(c,ci){
var el=document.createElement('div');el.className='crd';
var show=own||c.r;
if(show){el.className+=' '+cc(c);el.textContent=c.j?'*':c.n;if(c.r&&own)el.className+=' cpub';}
else{el.className+=' cback';}
if(G.ph==='guess'&&!p.out&&!c.r&&pi!==G.hi){el.className+=' sel';if(G.gt&&G.gt.pi===pi&&G.gt.ci===ci)el.className+=' stgt';el.onclick=(function(pi2,ci2){return function(){G.gt={pi:pi2,ci:ci2};ren();};})(pi,ci);}
rw.appendChild(el);
});
s.appendChild(rw);
if(own&&!p.out&&p.cs.length>0){var h=document.createElement('div');h.className='shint';h.textContent='Your cards (auto-sorted ascending, black-left)';s.appendChild(h);}
con.appendChild(s);
});
var aa=document.getElementById('act');aa.innerHTML='';
var cp=G.pl[G.cur];
document.getElementById('tinfo').textContent=cp.out?'':('Turn: '+cp.nm);
document.getElementById('dinfo').textContent='Deck: '+G.deck.length;
if(G.ph==='sort'&&!G.sa){var b=document.createElement('button');b.className='bact bcnf';b.textContent='I see my cards, start';b.onclick=function(){G.sa=true;G.ph='draw';ren();};aa.appendChild(b);return;}
if(G.ph==='draw'){if(cp.ih){var b=document.createElement('button');b.className='bact bcnf';b.textContent='Draw a card';b.onclick=hDraw;aa.appendChild(b);}else{aiTurn();}return;}
if(G.ph==='drawn'){var da=document.createElement('div');da.className='darea';da.innerHTML='<span class="dlbl">You drew: </span>';var c=G.drawn;var el=document.createElement('div');el.className='crd '+cc(c);el.textContent=c.j?'*':c.n;da.appendChild(el);aa.appendChild(da);renGP(aa);return;}
if(G.ph==='gres'){var da=document.createElement('div');da.className='darea';da.innerHTML='<span class="dlbl">You drew: </span>';var c=G.drawn;var el=document.createElement('div');el.className='crd '+cc(c);el.textContent=c.j?'*':c.n;da.appendChild(el);aa.appendChild(da);var bs=document.createElement('div');bs.className='abtn';if(G.lastOk){var bc=document.createElement('button');bc.className='bact bcnt';bc.textContent='Continue guessing';bc.onclick=function(){G.ph='drawn';G.gt=null;G.gc=null;G.gn=null;G.gj=false;ren();};bs.appendChild(bc);var be=document.createElement('button');be.className='bact bend';be.textContent='End turn (insert card)';be.onclick=function(){insCard(false);};bs.appendChild(be);}aa.appendChild(bs);return;}
if(G.ph==='iwrong'){var da=document.createElement('div');da.className='darea';da.innerHTML='<span class="dlbl">Wrong! Your card is revealed: </span>';var c=G.drawn;var el=document.createElement('div');el.className='crd '+cc(c)+' cpub';el.textContent=c.j?'*':c.n;da.appendChild(el);aa.appendChild(da);setTimeout(function(){insCard(true);},1200);return;}
}
function renGP(aa){
var gp=document.createElement('div');gp.className='gpanel';gp.innerHTML='<h3>Guess: pick target and your guess</h3>';
if(G.gt){var tl=document.createElement('div');tl.style.cssText='font-size:.85em;color:#888';tl.textContent='Target: '+G.pl[G.gt.pi].nm+' card #'+(G.gt.ci+1);gp.appendChild(tl);}
var cr=document.createElement('div');cr.className='grow';
COLORS.forEach(function(v){var b=document.createElement('button');b.className='bopt'+((G.gc===v&&!G.gj)?' active':'');b.textContent=CLABEL[v];b.onclick=function(){G.gj=false;G.gc=v;ren();};cr.appendChild(b);});
if(G.jk){var b=document.createElement('button');b.className='bopt'+(G.gj?' active':'');b.textContent='Joker';b.onclick=function(){G.gj=true;G.gc=null;G.gn=null;ren();};cr.appendChild(b);}
gp.appendChild(cr);
if(!G.gj){var nr=document.createElement('div');nr.className='grow';for(var n=0;n<=11;n++){var b=document.createElement('button');b.className='bopt'+(G.gn===n?' active':'');b.textContent=n;b.onclick=(function(n2){return function(){G.gn=n2;ren();};})(n);nr.appendChild(b);}gp.appendChild(nr);}
var ok=G.gt&&(G.gj||(G.gc!==null&&G.gn!==null));
if(ok){var b=document.createElement('button');b.className='bact bcnf';b.textContent='Confirm: '+(G.gj?'Joker':(CLABEL[G.gc]+' '+G.gn));b.onclick=doGuess;gp.appendChild(b);}
aa.appendChild(gp);
}
function msg(t){document.getElementById('msg').textContent=t;}
function nextT(){
chkElim();if(chkWin())return;
do{G.cur=(G.cur+1)%G.pc;}while(G.pl[G.cur].out);
G.drawn=null;G.gt=null;G.gc=null;G.gn=null;G.gj=false;
G.ph='draw';ren();
}
function chkElim(){
G.pl.forEach(function(p){if(!p.out&&p.cs.length>0&&p.cs.every(function(c){return c.r;})){p.out=true;msg(p.nm+' eliminated!');}});
}
function chkWin(){
var al=G.pl.filter(function(p){return!p.out;});
if(al.length<=1){G.ph='over';var o=document.getElementById('ov');o.style.display='flex';document.getElementById('ovt').textContent='Game Over!';document.getElementById('ovm').textContent=al.length===1?al[0].nm+' wins!':'Draw!';return true;}return false;
}
function hDraw(){
if(G.deck.length===0){msg('Deck empty!');var b=null,bc=-1;G.pl.forEach(function(p){var h=p.cs.filter(function(c){return!c.r;}).length;if(h>bc){bc=h;b=p;}});var o=document.getElementById('ov');o.style.display='flex';document.getElementById('ovt').textContent='Deck Empty!';document.getElementById('ovm').textContent=(b?b.nm:'Nobody')+' wins with '+bc+' hidden cards!';return;}
G.drawn=G.deck.pop();G.ph='drawn';G.gt=null;G.gc=null;G.gn=null;G.gj=false;msg('You drew a card. Now guess!');ren();
}
function doGuess(){
if(!G.gt)return;
var t=G.pl[G.gt.pi];var c=t.cs[G.gt.ci];
var gs=G.gj?'Joker':(CLABEL[G.gc]+' '+G.gn);
var ok=false;
if(G.gj){ok=c.j;}else{if(c.j)ok=false;else ok=(c.c===G.gc&&c.n===G.gn);}
if(ok){c.r=true;G.lastOk=true;msg('Correct! '+t.nm+'\'s '+gs+' is revealed!');G.ph='gres';chkElim();if(chkWin())return;ren();}
else{G.lastOk=false;G.drawn.r=true;msg('Wrong! Your card is revealed as penalty.');G.ph='iwrong';ren();}
}
function insCard(pub){
var p=G.pl[G.hi];var c=G.drawn;c.r=c.r||pub;p.cs.push(c);p.cs=sortC(p.cs);
msg(pub?'Card inserted (revealed).':'Card inserted secretly.');
G.drawn=null;setTimeout(function(){nextT();},800);
}
function aiTurn(){
if(G.ph==='over')return;
var ai=G.pl[G.cur];if(ai.out){nextT();return;}
if(!G.drawn){
if(G.deck.length===0){msg('Deck empty!');var b=null,bc=-1;G.pl.forEach(function(p){var h=p.cs.filter(function(c){return!c.r;}).length;if(h>bc){bc=h;b=p;}});var o=document.getElementById('ov');o.style.display='flex';document.getElementById('ovt').textContent='Deck Empty!';document.getElementById('ovm').textContent=(b?b.nm:'Nobody')+' wins with '+bc+' hidden cards!';return;}
G.drawn=G.deck.pop();}
msg(ai.nm+' drew a card...');ren();
setTimeout(function(){aiGuess();},1000);
}
function aiGuess(){
var ai=G.pl[G.cur];
var ks=new Set();
G.pl.forEach(function(p){p.cs.forEach(function(c){if(c.r&&!c.j)ks.add(c.c+c.n);});});
var ops=[];for(var i=0;i<G.pc;i++){if(i!==G.cur&&!G.pl[i].out&&G.pl[i].cs.some(function(c){return!c.r;}))ops.push(i);}
if(ops.length===0){aiEnd(ai,false);return;}
var oi=ops[Math.floor(Math.random()*ops.length)];var op=G.pl[oi];
var hi2=[];op.cs.forEach(function(c,i){if(!c.r)hi2.push(i);});
if(hi2.length===0){aiEnd(ai,false);return;}
var ti=hi2[Math.floor(Math.random()*hi2.length)];
var gc2,gn2,gj2=false;
if(G.jk&&Math.random()<0.1){gj2=true;}
else{
var av=[];for(var n=0;n<=11;n++){if(!ks.has('black'+n))av.push({c:'black',n:n});if(!ks.has('white'+n))av.push({c:'white',n:n});}
if(av.length>0){var g=av[Math.floor(Math.random()*av.length)];gc2=g.c;gn2=g.n;}
else{gc2=Math.random()<0.5?'black':'white';gn2=Math.floor(Math.random()*12);}
}
var gs=gj2?'Joker':(CLABEL[gc2]+' '+gn2);
var card=op.cs[ti];var ok=false;
if(gj2){ok=card.j;}else{if(card.j)ok=false;else ok=(card.c===gc2&&card.n===gn2);}
if(ok){card.r=true;msg(ai.nm+' guessed '+op.nm+'\'s '+gs+' - Correct!');ren();chkElim();if(chkWin())return;if(Math.random()<0.5&&op.cs.some(function(c){return!c.r;})){setTimeout(function(){aiGuess();},1200);}else{setTimeout(function(){aiEnd(ai,false);},1000);}}
else{G.drawn.r=true;msg(ai.nm+' guessed '+op.nm+'\'s '+gs+' - Wrong!');ren();setTimeout(function(){aiEnd(ai,true);},1000);}
}
function aiEnd(ai,pub){var c=G.drawn;c.r=c.r||pub;ai.cs.push(c);ai.cs=sortC(ai.cs);G.drawn=null;ren();setTimeout(function(){nextT();},800);}
document.querySelectorAll('#pbtns .bopt').forEach(function(b){b.onclick=function(){document.querySelectorAll('#pbtns .bopt').forEach(function(x){x.classList.remove('active');});b.classList.add('active');};});
document.querySelectorAll('#mbtns .bopt').forEach(function(b){b.onclick=function(){document.querySelectorAll('#mbtns .bopt').forEach(function(x){x.classList.remove('active');});b.classList.add('active');};});
document.getElementById('btnStart').onclick=function(){
var pc=parseInt(document.querySelector('#pbtns .bopt.active').dataset.v);
var jk=document.querySelector('#mbtns .bopt.active').dataset.v==='1';
document.getElementById('setup').style.display='none';
document.getElementById('game').style.display='block';
newGame(pc,jk);
};
</script>
</body>
</html>
